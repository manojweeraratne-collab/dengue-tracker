<!DOCTYPE html>  
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Dengue Spotter App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        .btn-gps { background-color: #6c757d; }
        .btn-cam { background-color: #ff4747; }
        .btn-cap { background-color: #28a745; }
        .btn-sub { background-color: #007bff; font-weight: bold;}
        
        button:hover { opacity: 0.9; }
        
        video, canvas {
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
            background: #ddd;
        }
        .status {
            margin: 10px 0;
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }
        select, input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">

    <h3 style="text-align: left; margin-bottom: 5px;">1. Select Area</h3>

        <option value="North Western">North Western (වයඹ)</option>
        <option value="North Central">North Central (උතුරු මැද)</option>

        <option value="Sabaragamuwa">Sabaragamuwa (සබරගමුව)</option>
    </select>

    <select id="district">
        <option value="">Select District</option>
    </select>

    <input type="text" id="city" placeholder="Enter Main City (e.g. Maharagama, Kandy)">

    <hr>

    <h3 style="text-align: left; margin-bottom: 5px;">2. Pinpoint Location</h3>
    <button class="btn-gps" onclick="getGPS()">📍 Get GPS Coordinates</button>
    <div id="gps-status" class="status">GPS: Not Captured</div>

    <hr>

    <h3 style="text-align: left; margin-bottom: 5px;">3. Take Evidence</h3>
    <button class="btn-cam" onclick="startCamera()">📷 Open Camera</button>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <button id="capture-btn" class="btn-cap" onclick="capturePhoto()" style="display:none;">📸 Take Photo</button>
    
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="photo-status" class="status">Photo: Not Taken</div>

    <hr>

    <button class="btn-sub" onclick="submitReport()">🚀 Submit Report</button>
    <div id="submit-status" class="status"></div>
</div>

<script>

    let lon = null;
    let photoData = null;

    // Dynamic Dropdown wadeta adala JavaScript kalla
const locationData = {
    "Western": ["Colombo", "Gampaha", "Kalutara"],

    "Uva": ["Badulla", "Monaragala"],
    "Sabaragamuwa": ["Ratnapura", "Kegalle"]
};

// Me function eka thiyeda balanna, nama 100% match wenna oni screenshot eke thiyena ekata
function updateDistricts() {
    const provinceSelect = document.getElementById("province");
    const districtSelect = document.getElementById("district");
    const selectedProvince = provinceSelect.value;

    // Clear previous options
    districtSelect.innerHTML = '<option value="">Select District</option>';

    if (selectedProvince && locationData[selectedProvince]) {
        locationData[selectedProvince].forEach(district => {
            const option = document.createElement("option");
            option.value = district;
            option.textContent = district;
            districtSelect.appendChild(option);
        });
    }
}

    // 1. Get GPS Coordinates
    function getGPS() {
        document.getElementById('gps-status').innerText = "⏳ Fetching GPS...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    lat = position.coords.latitude;
                    lon = position.coords.longitude;
                    document.getElementById('gps-status').innerHTML = `✅ GPS Locked!<br>Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}`;
                    document.getElementById('gps-status').style.color = "green";
                },
                (error) => {
                    alert("Location access denied. Please enable GPS in your phone settings.");
                    document.getElementById('gps-status').innerText = "❌ GPS Failed";
                }
            );
        } else {
            alert("Geolocation is not supported by your browser.");
        }
    }
