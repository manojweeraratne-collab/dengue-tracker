<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dengue Spotter App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        button {
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .btn-gps {
            background-color: #6c757d;
        }

        .btn-cam {
            background-color: #ff4747;
        }

        .btn-cap {
            background-color: #28a745;
        }

        .btn-sub {
            background-color: #007bff;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        video,
        canvas {
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
            background: #ddd;
        }

        .status {
            margin: 10px 0;
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🦟 Dengue Spotter</h2>
        <p>Dengue inna thana report karanna</p>
        <hr>

        <h3 style="text-align: left; margin-bottom: 5px;">1. Select Area</h3>
        <!-- Google Sheet eken dynamic load wenna methනට onchange කෑල්ල දැම්මා -->
        <select id="province" onchange="updateDistricts()">
            <option value="">Select Province</option>
        </select>

        <select id="district">
            <option value="">Select District</option>
        </select>

        <input type="text" id="city" placeholder="Enter Main City (e.g. Kotte)">

        <hr>

        <h3 style="text-align: left; margin-bottom: 5px;">2. Pinpoint Location</h3>
        <button class="btn-gps" onclick="getGPS()">📍 Get GPS Coordinates</button>
        <div id="gps-status" class="status">GPS: Not Captured</div>

        <hr>

        <h3 style="text-align: left; margin-bottom: 5px;">3. Take Evidence</h3>
        <button class="btn-cam" onclick="startCamera()">📷 Open Camera</button>
        <video id="video" autoplay playsinline style="display:none;"></video>
        <button id="capture-btn" class="btn-cap" onclick="capturePhoto()" style="display:none;">📸 Take Photo</button>

        <canvas id="canvas" style="display:none;"></canvas>
        <div id="photo-status" class="status">Photo: Not Taken</div>

        <hr>

        <button class="btn-sub" onclick="submitReport()">🚀 Submit Report</button>
        <div id="submit-status" class="status"></div>
    </div>

    <script>
        let lat = null;
        let lon = null;
        let photoData = null;
        let stream = null;
        
        // Sheet eke data load karගන්න හිස් Object එකක් හැදුවා
        let locationData = {};

        // Oyage Live Google Apps Script Web App URL eka (Globally damma)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuBtC3-sVEZm0NuswlX0iVS2eT1PbsVbpgA5rRUwdvDFOFf-ywtlVM0tKVepamDMoFNA/exec";

        // App eka open වෙද්දීම Google Sheet එකෙන් Locations ටැබ් එක කියවලා dropdown එක පුරවනවා
        window.onload = function() {
            const provinceSelect = document.getElementById('province');
            provinceSelect.innerHTML = '<option value="">⏳ Loading Provinces...</option>';

            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    locationData = data;
                    provinceSelect.innerHTML = '<option value="">Select Province</option>';
                    
                    // Province ලැයිස්තුව ඩ්‍රොප්ඩවුන් එකට දානවා
                    Object.keys(locationData).forEach(province => {
                        const option = document.createElement('option');
                        option.value = province;
                        option.textContent = province;
                        provinceSelect.appendChild(option);
                    });
                    console.log("Data loaded successfully from Google Sheet:", locationData);
                })
                .catch(error => {
                    console.error("Error loading location data:", error);
                    provinceSelect.innerHTML = '<option value="">❌ Error loading data</option>';
                    alert("Failed to load Provinces. Please refresh the page.");
                });
        };

        // Province එක සිලෙක්ට් කරාම ඒකට අදාළ දිස්ත්‍රික්ක ටික ලෝඩ් කරන function එක
        function updateDistricts() {
            const provinceSelect = document.getElementById("province");
            const districtSelect = document.getElementById("district");
            const selectedProvince = provinceSelect.value;

            // කලින් තිබ්බ දිස්ත්‍රික්ක Clear කරනවා
            districtSelect.innerHTML = '<option value="">Select District</option>';

            if (selectedProvince && locationData[selectedProvince]) {
                locationData[selectedProvince].forEach(district => {
                    const option = document.createElement("option");
                    option.value = district;
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
            }
        }

        // 1. Get GPS Coordinates
        function getGPS() {
            document.getElementById('gps-status').innerText = "⏳ Fetching GPS...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        lat = position.coords.latitude;
                        lon = position.coords.longitude;
                        document.getElementById('gps-status').innerHTML = `✅ GPS Locked!<br>Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}`;
                        document.getElementById('gps-status').style.color = "green";
                    },
                    (error) => {
                        alert("Location access denied. Please enable GPS in your phone settings.");
                        document.getElementById('gps-status').innerText = "❌ GPS Failed";
                    }
                );
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }

        // 2. Start Camera
        function startCamera() {
            const video = document.getElementById('video');
            const captureBtn = document.getElementById('capture-btn');

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then((mediaStream) => {
                    stream = mediaStream;
                    video.srcObject = mediaStream;
                    video.style.display = "block";
                    captureBtn.style.display = "block";
                })
                .catch((err) => {
                    alert("Camera access denied or not found.");
                });
        }

        // 3. Capture Photo
        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Save image as Base64 string
            photoData = canvas.toDataURL('image/jpeg');

            // Stop camera stream to save battery
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            video.style.display = "none";
            document.getElementById('capture-btn').style.display = "none";
            canvas.style.display = "block"; // Show captured image

            document.getElementById('photo-status').innerText = "✅ Photo Captured!";
            document.getElementById('photo-status').style.color = "green";
        }

        // 4. Submit Report Data to Google Sheet
        function submitReport() {
            const province = document.getElementById('province').value;
            const district = document.getElementById('district').value;
            const city = document.getElementById('city').value;

            // Check if all details are filled
            if (!province || !district || !city) {
                alert("⚠️ Please select Province, District and enter the City.");
                return;
            }
            if (!lat || !lon) {
                alert("⚠️ Please get GPS Coordinates!");
                return;
            }
            if (!photoData) {
                alert("⚠️ Please take a photo of the location!");
                return;
            }

            const report = {
                time: new Date().toLocaleString(),
                latitude: lat,
                longitude: lon,
                image: photoData,
                province: province,
                district: district,
                city: city
            };

            const statusDiv = document.getElementById('submit-status');
            statusDiv.innerText = "⏳ Submitting... Please wait.";
            statusDiv.style.color = "blue";

            // Send data to Google Apps Script
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(report)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        statusDiv.innerText = "✅ Report Successfully Submitted!";
                        statusDiv.style.color = "green";
                        alert("🎉 Thank you! The report has been saved.");
                    } else {
                        statusDiv.innerText = "❌ Error in saving data.";
                        statusDiv.style.color = "red";
                    }
                })
                .catch(error => {
                    statusDiv.innerText = "❌ Network Error.";
                    statusDiv.style.color = "red";
                    console.error(error);
                });
        }
    </script>

</body>

</html>
